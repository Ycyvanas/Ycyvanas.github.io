            <h2>项目管理理念</h2>
            <ul>
                <li><strong>不忘初心</strong>：只做解决真问题的项目，不玩概念，不赶风口</li>
                <li><strong>开放生长</strong>：不设上限，随时欢迎新的神灵加入万族图谱</li>
                <li><strong>知识沉淀</strong>：记录每一步探索，分享思考与踩坑，让后来者少走弯路</li>
                <li><strong>文化融合</strong>：用中国传统美学包装现代技术，让AI也有东方韵味</li>
            </ul>
